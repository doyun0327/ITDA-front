name: Deploy Frontend

on:
  push:///////////////////////////////////////////////////
    branches: [ main ]

jobs:
  deploy:
    runs-on: self-hosted

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Execute Deploy Script
        run: |
          # 스크립트 실행 권한 부여 후 실행
          chmod +x ~/deploy_frontend.sh
          ~/deploy_frontend.sh